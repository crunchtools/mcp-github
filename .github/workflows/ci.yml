name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run linter
        run: uv run ruff check src tests

      - name: Run type checker
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest -v
        env:
          GITHUB_TOKEN: "test_token_for_ci"

  gourmand:
    name: Code Quality (Gourmand)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Gourmand (AI slop detection)
        run: |
          docker run --rm -v "${{ github.workspace }}":/repo \
            quay.io/crunchtools/gourmand:latest --full /repo

  build-container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: |
          docker build -f Containerfile -t mcp-github:test .

      - name: Verify container
        run: |
          # Just verify it starts (will fail due to no token, but should start)
          timeout 5 docker run --rm mcp-github:test || true

  validate-constitution:
    name: Constitution Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: crunchtools/constitution
          path: .constitution

      - name: Validate constitution
        run: python3 .constitution/validate-constitution.py .specify/memory/constitution.md --verbose
